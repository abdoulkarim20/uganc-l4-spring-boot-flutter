<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Changer le mot de passe | GARAGIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel">
        <div class="brand login-brand">
            <img class="brand-logo login-logo brand-logo-only" src="/images/garagix-logo.png" alt="GARAGIX">
        </div>
        <p class="eyebrow">Sécurité du compte</p>
        <h1>Changer votre mot de passe</h1>
        <p class="access-denied-copy">
            Ce mot de passe est temporaire. Définissez un mot de passe personnel avant d’accéder à votre espace.
        </p>
        <form class="login-form" id="changePasswordForm">
            <div class="form-field full">
                <label for="currentPassword">Mot de passe actuel</label>
                <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required autofocus>
            </div>
            <div class="form-field full">
                <label for="newPassword">Nouveau mot de passe</label>
                <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="6" required>
            </div>
            <div class="form-field full">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
            </div>
            <p class="form-error" data-change-password-error hidden></p>
            <button class="primary-button login-button" type="submit">Valider le nouveau mot de passe</button>
        </form>
    </section>
</main>
<script src="/js/auth.js?v=9"></script>
<script src="/js/change-password.js?v=1"></script>
</body>
</html>
