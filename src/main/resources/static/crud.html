<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRUD | Gestion Garage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" aria-label="Navigation principale">
        <div class="brand">
            <img class="brand-logo" src="/images/garagix-logo.png" alt="GARAGIX">
            <div>
                <strong>GARAGIX</strong>
                <small>Gestion garage</small>
            </div>
        </div>

        <nav class="menu">
            <a class="menu-link" href="/dashboard">
                <span class="icon">DB</span>
                Tableau de bord
            </a>
            <a class="menu-link" href="/clients" data-menu="clients">
                <span class="icon">CL</span>
                Clients
            </a>
            <a class="menu-link" href="/vehicules" data-menu="vehicules">
                <span class="icon">VH</span>
                Véhicules
            </a>
            <a class="menu-link" href="/mecaniciens" data-menu="mecaniciens">
                <span class="icon">MC</span>
                Mécaniciens
            </a>
            <a class="menu-link" href="/reparations" data-menu="reparations">
                <span class="icon">RP</span>
                Réparations
            </a>
            <!--<a class="menu-link" href="/swagger-ui.html">
                <span class="icon">?</span>
                Documentation API
            </a>-->
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="icon-button sidebar-toggle" type="button" aria-label="Ouvrir le menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div>
                <p class="eyebrow" id="pageEyebrow">Administration</p>
                <h1 id="pageTitle">Chargement...</h1>
            </div>
            <div class="topbar-actions">
                <a class="ghost-button button-link" href="/clients/create">Nouveau client</a>
                <a class="primary-button button-link" href="/reparations/create">Nouvelle réparation</a>
                <a class="ghost-button button-link" href="/logout">Déconnexion</a>
            </div>
        </header>

        <section class="panel page-card" id="listView" hidden>
            <div class="panel-header">
                <div>
                    <p class="eyebrow" id="listEyebrow">Module</p>
                    <h3 id="listTitle">Liste</h3>
                </div>
                <a class="primary-button button-link" id="addLink" href="#">Ajouter</a>
            </div>
            <div class="table-wrap">
                <table class="admin-table">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody">
                    <tr><td class="empty">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel page-card form-card" id="formView" hidden>
            <form id="crudForm">
                <div class="form-grid" id="formFields"></div>
                <div class="form-error" id="formError" hidden></div>
                <div class="modal-actions">
                    <a class="ghost-button button-link" id="cancelLink" href="#">Annuler</a>
                    <button class="primary-button" type="submit">Enregistrer</button>
                </div>
            </form>
        </section>
    </main>
</div>

<div class="toast" id="toast" hidden></div>
<script src="/js/crud.js"></script>
</body>
</html>
