spring.application.name=gestiongarage
server.port=${PORT:8383}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:db_gestion_garage}}
spring.datasource.username=${DATABASE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${PGPASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

app.security.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.security.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.security.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:600}

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=GaragixHikariCP
spring.datasource.hikari.max-lifetime=600000
