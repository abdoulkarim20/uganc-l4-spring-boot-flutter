<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accès refusé | GARAGIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel access-denied-panel">
        <div class="brand login-brand">
            <img class="brand-logo login-logo brand-logo-only" src="/images/garagix-logo.png" alt="GARAGIX">
        </div>
        <p class="eyebrow">Accès non autorisé</p>
        <h1>Impossible d’ouvrir cette page</h1>
        <p class="access-denied-copy">
            Votre session ne permet pas d’accéder à cette ressource.
            Vérifiez votre compte ou revenez à l’accueil.
        </p>
        <div class="landing-actions">
            <a class="primary-button button-link" href="/login">Changer de compte</a>
            <a class="ghost-button button-link" href="/">Retour à l’accueil</a>
        </div>
    </section>
</main>
</body>
</html>
